# https://taskfile.dev
version: "3"

vars:
  SRC: src/ examples/

tasks:
  # ---------- Meta ----------
  default:
    desc: List available tasks
    cmds:
      - task --list-all

  # ---------- Quality ----------
  fmt:
    desc: Auto-format code with ruff
    cmds:
      - uvx ruff format {{.SRC}}

  fmt:check:
    desc: Check formatting without modifying files
    cmds:
      - uvx ruff format --check {{.SRC}}

  lint:
    desc: Run ruff linter (auto-fix)
    cmds:
      - uvx ruff check --fix {{.SRC}}

  lint:check:
    desc: Run ruff linter (check only, no fixes)
    cmds:
      - uvx ruff check {{.SRC}}

  typecheck:
    desc: Run ty type checker
    cmds:
      - uvx ty check

  check:
    desc: Run all quality checks (lint, format, type-check)
    cmds:
      - task: lint:check
      - task: fmt:check
      - task: typecheck

  fix:
    desc: Auto-fix lint issues and reformat
    cmds:
      - task: lint
      - task: fmt

  # ---------- Run ----------
  run:
    desc: Run the main DuckDB demo (auto-fixes lint/format first)
    deps: [fix]
    cmds:
      - uv run python -m duckdb_demo.main

  run:example:
    desc: "Run a standalone example (usage: task run:example -- <script>.py)"
    cmds:
      - uv run python examples/{{.CLI_ARGS}}

  # ---------- Tracks ----------
  run:track1:
    desc: "Run all Track 1 — Foundations examples"
    cmds:
      - for f in examples/1*.py; do echo "--- $f ---"; uv run python "$f"; done

  run:track2:
    desc: "Run all Track 2 — Core SQL examples"
    cmds:
      - for f in examples/2*.py; do echo "--- $f ---"; uv run python "$f"; done

  run:track3:
    desc: "Run all Track 3 — Intermediate SQL examples"
    cmds:
      - for f in examples/3*.py; do echo "--- $f ---"; uv run python "$f"; done

  run:track4:
    desc: "Run all Track 4 — Data I/O & Export examples"
    cmds:
      - for f in examples/4*.py; do echo "--- $f ---"; uv run python "$f"; done

  run:track5:
    desc: "Run all Track 5 — Python Interop examples"
    cmds:
      - for f in examples/5*.py; do echo "--- $f ---"; uv run python "$f"; done

  run:track6:
    desc: "Run all Track 6 — Advanced SQL examples"
    cmds:
      - for f in examples/6*.py; do echo "--- $f ---"; uv run python "$f"; done

  run:track7:
    desc: "Run all Track 7 — Visualization examples"
    cmds:
      - for f in examples/7*.py; do echo "--- $f ---"; uv run python "$f"; done

  run:track8:
    desc: "Run all Track 8 — Real-World Patterns examples"
    cmds:
      - for f in examples/8*.py; do echo "--- $f ---"; uv run python "$f"; done

  run:all-tracks:
    desc: "Run all example tracks (1-8) sequentially"
    cmds:
      - task: run:track1
      - task: run:track2
      - task: run:track3
      - task: run:track4
      - task: run:track5
      - task: run:track6
      - task: run:track7
      - task: run:track8

  # ---------- Test ----------
  test:
    desc: Run tests with pytest
    cmds:
      - uv run pytest {{.CLI_ARGS}}

  # ---------- Project ----------
  sync:
    desc: Install / update dependencies from the lockfile
    cmds:
      - uv sync

  clean:
    desc: Remove build artifacts and caches
    cmds:
      - rm -rf .venv __pycache__ .pytest_cache .ruff_cache dist build
      - find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
      - find . -name '*.duckdb' -o -name '*.duckdb.wal' | xargs rm -f 2>/dev/null || true
